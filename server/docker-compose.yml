version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: dalia-postgres
    environment:
      POSTGRES_USER: dalia
      POSTGRES_PASSWORD: dalia
      POSTGRES_DB: dalia
    ports:
      - "5432:5432"
    volumes:
      - dalia_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dalia"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  dalia_pgdata:
